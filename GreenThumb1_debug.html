<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GreenThumb AI - Versione Integrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .screen { display: none; min-height: 100vh; padding-bottom: 120px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .shadow-up { box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative border-x border-slate-100">
        
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-50 p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <button id="backBtn" onclick="navigate('home')" class="hidden p-1 text-green-800">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1 id="headerTitle" class="text-xl font-extrabold text-green-900 tracking-tight">GreenThumb</h1>
            </div>
            <div id="statusLed" class="w-3 h-3 rounded-full bg-slate-200 shadow-inner transition-colors duration-500"></div>
        </header>

        <section id="home" class="screen active p-4 space-y-6">
            <div class="bg-green-600 rounded-[32px] p-6 text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold italic">La tua Giungla 🌿</h2>
                    <p class="opacity-90 text-sm mt-1" id="plantCount">Inizializzazione...</p>
                </div>
                <svg class="absolute -right-6 -bottom-6 w-32 h-32 opacity-20 rotate-12" fill="currentColor" viewBox="0 0 24 24"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,11 17,8 17,8Z"/></svg>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="navigate('add')" class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="p-3 bg-green-100 text-green-600 rounded-2xl">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    </div>
                    <span class="font-bold text-slate-700 text-xs uppercase tracking-widest">Aggiungi</span>
                </button>
                <button onclick="navigate('database')" class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="p-3 bg-orange-100 text-orange-600 rounded-2xl">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                    </div>
                    <span class="font-bold text-slate-700 text-xs uppercase tracking-widest">Archivio</span>
                </button>
            </div>
        </section>

        <section id="calendar" class="screen p-4 space-y-4">
            <h3 class="font-bold text-slate-800">Cose da fare oggi</h3>
            <div id="calendarList" class="space-y-3"></div>
        </section>

        <section id="database" class="screen p-4 space-y-4">
            <div id="plantList" class="space-y-4"></div>
        </section>

        <section id="add" class="screen p-4 space-y-6">
            <div id="debugLog" class="bg-slate-900 text-[10px] text-green-400 p-2 font-mono rounded-xl h-40 overflow-y-auto mb-2">
                > Sistema pronto. Carica una foto.
            </div>

            <div class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100 space-y-6">
                <div id="uploadBox" class="h-64 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center relative overflow-hidden">
                    <img id="imgPreview" class="hidden w-full h-full object-cover">
                    <div id="uploadPrompt" class="flex flex-col items-center text-center p-4">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                        <p class="text-xs text-slate-400 font-bold mt-3 uppercase tracking-wider">Scatta o Scegli Foto</p>
                    </div>
                    <input type="file" id="fileIn" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>

                <div id="aiLoader" class="hidden p-4 bg-green-50 rounded-2xl text-green-700 font-bold text-xs text-center animate-pulse italic">
                    Scansione modelli Google in corso...
                </div>

                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="Soprannome (es. Berto)" class="w-full bg-slate-50 rounded-2xl py-4 px-5 text-sm outline-none border border-transparent focus:border-green-500 transition-all">
                    <input type="text" id="pSpec" placeholder="Specie (IA)" class="w-full bg-slate-100 rounded-2xl py-4 px-5 text-sm outline-none" readonly>
                </div>

                <button onclick="savePlant()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-extrabold shadow-lg active:scale-95 transition">
                    Salva Pianta
                </button>
            </div>
        </section>

        <section id="detail" class="screen">
            <div id="detailView"></div>
        </section>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t flex justify-around p-4 z-50 pb-10 shadow-up">
            <button onclick="navigate('home')" class="p-2 nav-icon text-green-600" id="nav-home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <button onclick="navigate('calendar')" class="p-2 nav-icon text-slate-400" id="nav-calendar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </button>
            <button onclick="navigate('add')" class="p-4 bg-green-600 text-white rounded-full -mt-10 shadow-xl active:scale-90 transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button onclick="navigate('database')" class="p-2 nav-icon text-slate-400" id="nav-database">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </button>
        </nav>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE: INCOLLA QUI LA TUA CHIAVE
        // ⚠️ Non condividere questo file con la chiave inserita!
        // ==========================================
        const API_KEY = "INSERISCI_QUI_LA_TUA_API_KEY";

        // Combinazioni valide endpoint/modello (solo quelle compatibili)
        const MODELS = [
            { endpoint: "v1beta", model: "gemini-2.0-flash" },
            { endpoint: "v1beta", model: "gemini-1.5-flash" },
            { endpoint: "v1beta", model: "gemini-1.5-flash-8b" },
            { endpoint: "v1",     model: "gemini-1.5-flash" },
        ];

        let plants = JSON.parse(localStorage.getItem('gt_v3_data')) || [];
        let tempImg = null, tempInfo = null;

        function log(msg) {
            const debugEl = document.getElementById('debugLog');
            if(debugEl) {
                debugEl.innerHTML += `<br>> ${msg}`;
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        }

        function navigate(screenId, plantId = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.replace('text-green-600', 'text-slate-400'));
            const activeNav = document.getElementById('nav-' + screenId);
            if(activeNav) activeNav.classList.replace('text-slate-400', 'text-green-600');
            
            document.getElementById('backBtn').style.display = screenId === 'home' ? 'none' : 'block';
            const titles = {home:'GreenThumb', database:'Archivio', add:'Analisi IA', detail:'Cura', calendar:'Task'};
            document.getElementById('headerTitle').innerText = titles[screenId];

            if(screenId === 'database') renderDB();
            if(screenId === 'calendar') renderCalendar();
            if(screenId === 'detail') renderDetail(plantId);
            
            updateStats();
            window.scrollTo(0,0);
        }

        // Ridimensionamento per stabilità mobile
        async function resizeImg(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if(w > h) { if(w > max) { h *= max/w; w = max; } }
                        else { if(h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    }
                }
            });
        }

        document.getElementById('fileIn').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            log("Immagine ricevuta. Ridimensionamento...");
            tempImg = await resizeImg(file);
            document.getElementById('imgPreview').src = tempImg;
            document.getElementById('imgPreview').classList.remove('hidden');
            document.getElementById('uploadPrompt').classList.add('hidden');
            
            // Avvio scansione intelligente modelli
            startMultiProbe(tempImg.split(',')[1]);
        };

        async function startMultiProbe(base64) {
            const loader = document.getElementById('aiLoader');
            const led = document.getElementById('statusLed');
            loader.classList.remove('hidden');
            led.style.backgroundColor = "#fbbf24"; // Giallo

            const prompt = "Identifica pianta. Rispondi solo JSON: {\"species\":\"\", \"name\":\"\", \"desc\":\"\"}";
            
            // Loop attraverso le combinazioni valide endpoint/modello
            for (let { endpoint, model } of MODELS) {
                    log(`Testando ${endpoint} / ${model}...`);
                    try {
                        const url = `https://generativelanguage.googleapis.com/${endpoint}/models/${model}:generateContent?key=${API_KEY}`;
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{ parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] }] })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            log(`✨ SUCCESSO! Usando ${model}`);
                            const rawText = data.candidates[0].content.parts[0].text;
                            const json = JSON.parse(rawText.replace(/```json|```/g, "").trim());
                            document.getElementById('pName').value = json.name;
                            document.getElementById('pSpec').value = json.species;
                            tempInfo = json;
                            led.style.backgroundColor = "#22c55e"; // Verde
                            loader.classList.add('hidden');
                            return; // Uscita dal loop al primo successo
                        } else {
                            log(`❌ ${response.status}: ${data.error ? data.error.message : "Unknown error"}`);
                            log(`   status: ${data.error ? data.error.status : "?"}`);
                        }
                    } catch (err) {
                        log(`⚠️ CATCH: ${err.message}`);
                    }
            }
            
            led.style.backgroundColor = "#ef4444"; // Rosso
            loader.classList.add('hidden');
            alert("Nessun modello Google ha risposto. Controlla l'API Key o attendi 1 minuto.");
        }

        function savePlant() {
            const n = document.getElementById('pName').value, s = document.getElementById('pSpec').value;
            if(!n || !s || !tempImg) return alert("Completa l'analisi!");
            plants.unshift({ id: Date.now(), name: n, species: s, img: tempImg, desc: tempInfo?.desc || "" });
            localStorage.setItem('gt_v3_data', JSON.stringify(plants));
            location.reload();
        }

        function renderDB() {
            const list = document.getElementById('plantList');
            if(plants.length === 0) return list.innerHTML = "<div class='text-center py-20 text-slate-300 font-bold'>Archivio vuoto.</div>";
            list.innerHTML = plants.map(p => `
                <div onclick="navigate('detail', '${p.id}')" class="bg-white p-3 rounded-3xl border border-slate-50 flex items-center gap-4 shadow-sm active:scale-95 transition">
                    <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-sm">${p.name}</h4>
                        <p class="text-[10px] text-slate-400 italic">${p.species}</p>
                    </div>
                    <svg class="text-slate-300" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            `).join('');
        }

        function renderDetail(id) {
            const p = plants.find(x => x.id == id);
            document.getElementById('detailView').innerHTML = `
                <div class="h-80 relative">
                    <img src="${p.img}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 text-white">
                        <h2 class="text-3xl font-bold">${p.name}</h2>
                        <p class="opacity-80 italic text-sm">${p.species}</p>
                    </div>
                </div>
                <div class="p-6 -mt-10 bg-slate-50 rounded-t-[40px] relative z-10 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm leading-relaxed text-sm text-slate-600">${p.desc}</div>
                    <button onclick="deleteP(${p.id})" class="w-full py-4 text-red-500 font-bold text-xs uppercase tracking-widest">Elimina Pianta</button>
                </div>`;
        }

        window.deleteP = (id) => { if(confirm("Eliminare?")) { plants = plants.filter(x => x.id != id); localStorage.setItem('gt_v3_data', JSON.stringify(plants)); navigate('database'); } }

        function renderCalendar() {
            const list = document.getElementById('calendarList');
            if(plants.length === 0) return list.innerHTML = "<p class='text-center py-10 text-slate-300'>Aggiungi piante per vedere i task.</p>";
            list.innerHTML = plants.map(p => `
                <div class="bg-white p-5 rounded-3xl border flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></div>
                        <div><p class="font-bold text-sm">Bagnare ${p.name}</p></div>
                    </div>
                    <input type="checkbox" class="w-6 h-6 accent-green-600">
                </div>`).join('');
        }

        function updateStats() { document.getElementById('plantCount').innerText = `Hai ${plants.length} piante registrate.`; }
        window.onload = () => { updateStats(); navigate('home'); };
    </script>
</body>
</html>
